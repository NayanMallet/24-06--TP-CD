server {
    listen 80;
    server_name localhost;

    # Gestion des fichiers statiques du frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy pour rediriger le trafic /api vers le service backend
    location /api/ {
        # URL dans une variable pour forcer Nginx à évaluer le DNS dynamiquement plutôt qu'au démarrage
        set $backend_upstream http://backend:3000;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
