name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Job 1 : Build des images Docker (front et back) et push sur le Docker Hub
  build:
    name: Build & Push Docker Images
    runs-on: self-hosted
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et Push du service Backend (context ./backend pour copier correctement ses fichiers)
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/swarm-backend:${{ github.sha }}

      # Build et Push du service Frontend (context ./frontend pour copier correctement ses fichiers)
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/swarm-frontend:${{ github.sha }}

  # Job 2 : Déploiement sur le manager Docker Swarm via un runner self-hosted
  deploy:
    name: Deploy to Swarm Cluster
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Deploy Stack to Docker Swarm
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          docker stack deploy --with-registry-auth -c docker-stack.yml mon_app_ynov
